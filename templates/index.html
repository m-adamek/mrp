<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-3">
    <div class="card bg-light border-dashed">
        <div class="card-body d-flex align-items-center justify-content-between">
            <div>
                <strong>Wczytaj dane z systemu:</strong>
                <input type="file" id="excelFile" class="form-control-sm ms-2" accept=".xlsx, .xls">
            </div>
            <div>
                <button class="btn btn-success" onclick="uploadExcel()">Wczytaj dane</button>
                <a href="/download-template" class="btn btn-outline-secondary">Pobierz szablon</a>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5">
    <h1 class="text-center mb-4">Planowanie Produkcji (MRP)</h1>

    <!-- GHP INPUT -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Popyt produktu (GHP)</h5>
        </div>
        <div class="card-body">

            <label class="form-label">Popyt tygodniowy</label>
            <div id="ghp-popyt-container">
                <input type="number" class="form-control mb-2 ghp-input" placeholder="Tydzień 1">
            </div>

            <button class="btn btn-outline-secondary w-100 mb-3" onclick="addGhpInput()">+ Dodaj tydzień</button>

        </div>
    </div>

    <!-- PARAMETRY -->
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Parametry MRP (BOM)</h5>
        </div>

        <div class="card-body">
            <div class="row">

                <div class="col-md-4">
                    <h6>Zapas</h6>
                    <input type="number" class="form-control mb-2" id="zap_zapalniczka" placeholder="Zapalniczka">
                    <input type="number" class="form-control mb-2" id="zap_obudowa" placeholder="Obudowa">
                    <input type="number" class="form-control mb-2" id="zap_mechanizm" placeholder="Mechanizm">
                    <input type="number" class="form-control mb-2" id="zap_zbiornik" placeholder="Zbiornik">
                    <input type="number" class="form-control mb-2" id="zap_kolko" placeholder="Kółko">
                    <input type="number" class="form-control mb-2" id="zap_krzesiwo" placeholder="Krzesiwo">
                </div>

                <div class="col-md-4">
                    <h6>Czas realizacji</h6>
                    <input type="number" class="form-control mb-2" id="czas_zapalniczka">
                    <input type="number" class="form-control mb-2" id="czas_obudowa">
                    <input type="number" class="form-control mb-2" id="czas_mechanizm">
                    <input type="number" class="form-control mb-2" id="czas_zbiornik">
                    <input type="number" class="form-control mb-2" id="czas_kolko">
                    <input type="number" class="form-control mb-2" id="czas_krzesiwo">
                </div>

                <div class="col-md-4">
                    <h6>Wielkość partii</h6>
                    <input type="number" class="form-control mb-2" id="part_zapalniczka">
                    <input type="number" class="form-control mb-2" id="part_obudowa">
                    <input type="number" class="form-control mb-2" id="part_mechanizm">
                    <input type="number" class="form-control mb-2" id="part_zbiornik">
                    <input type="number" class="form-control mb-2" id="part_kolko">
                    <input type="number" class="form-control mb-2" id="part_krzesiwo">
                </div>

            </div>

            <button class="btn btn-dark mt-3 w-100" onclick="runFullMRP()">Oblicz pełne MRP</button>
        </div>
    </div>

    <div id="mrpTables" class="mt-5"></div>

</div>

<script>

// INPUT
function addGhpInput() {
    const c = document.getElementById("ghp-popyt-container");
    const input = document.createElement("input");
    input.type = "number";
    input.className = "form-control mb-2 ghp-input";
    input.placeholder = "Tydzień " + (c.children.length + 1);
    c.appendChild(input);
}

// MAIN
async function uploadExcel() {
    const fileInput = document.getElementById('excelFile');
    if (fileInput.files.length === 0) {
        alert("Wybierz plik Excel!");
        return;
    }

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    try {
        const res = await fetch('/upload', {
            method: 'POST',
            body: formData 
        });

        const data = await res.json();
        
        if (data.error) {
            alert(data.error);
        } else {
            renderTables(data);
            alert("Dane wczytane i obliczone pomyślnie!");
        }
    } catch (err) {
        console.error("Błąd przesyłania:", err);
        alert("Wystąpił błąd podczas wczytywania pliku.");
    }
}

async function runFullMRP() {
    try {
        console.log("klik działa");

        const popyt = Array.from(document.querySelectorAll('.ghp-input'))
            .map(i => parseInt(i.value))
            .filter(n => !isNaN(n));

        const zapasy = {
            zapalniczka: +document.getElementById("zap_zapalniczka").value,
            obudowa: +document.getElementById("zap_obudowa").value,
            mechanizm: +document.getElementById("zap_mechanizm").value,
            zbiornik: +document.getElementById("zap_zbiornik").value,
            kółko: +document.getElementById("zap_kolko").value,
            krzesiwo: +document.getElementById("zap_krzesiwo").value
        };

        const czasy = {
            zapalniczka: +document.getElementById("czas_zapalniczka").value,
            obudowa: +document.getElementById("czas_obudowa").value,
            mechanizm: +document.getElementById("czas_mechanizm").value,
            zbiornik: +document.getElementById("czas_zbiornik").value,
            kółko: +document.getElementById("czas_kolko").value,
            krzesiwo: +document.getElementById("czas_krzesiwo").value
        };

        const partie = {
            zapalniczka: +document.getElementById("part_zapalniczka").value,
            obudowa: +document.getElementById("part_obudowa").value,
            mechanizm: +document.getElementById("part_mechanizm").value,
            zbiornik: +document.getElementById("part_zbiornik").value,
            kółko: +document.getElementById("part_kolko").value,
            krzesiwo: +document.getElementById("part_krzesiwo").value
        };

        const res = await fetch('/full_mrp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ popyt, zapasy, czasy, partie })
        });

        const data = await res.json();
        console.log(data);

        renderTables(data);

    } catch (err) {
        console.error("BŁĄD:", err);
        alert("Błąd – sprawdź konsolę");
    }
}

// TABLE
function renderTables(data) {
    let html = "";

    const labels = {
        zapalniczka: "Zapalniczka",
        obudowa: "Obudowa",
        zbiornik: "Zbiornik",
        mechanizm: "Mechanizm",
        krzesiwo: "Krzesiwo",
        kółko: "Kółko"
    };


    const order = [
        "zapalniczka",
        "obudowa",
        "zbiornik",
        "mechanizm",
        "krzesiwo",
        "kółko"
    ];

    for (const name of order) {

        const mrp = data[name];
        if (!mrp) continue;

        html += `<h4 class="mt-4 text-capitalize">${name}</h4>`;
        html += `<table class="table table-bordered text-center">`;

        html += `<tr>
            <th>Tydzień</th>
            ${mrp["Całkowite zapotrzebowanie"].map((_, i)=>`<th>${i+1}</th>`).join("")}
        </tr>`;

        for (const [k, v] of Object.entries(mrp)) {
            html += `<tr>
                <td><b>${k}</b></td>
                ${v.map(x=>`<td>${x}</td>`).join("")}
            </tr>`;
        }

        html += `</table>`;
    }

    document.getElementById("mrpTables").innerHTML = html;

    html += `<button class="btn btn-primary mt-4 mb-5" onclick="exportToExcel()">Eksportuj wyniki do Excela</button>`;
    document.getElementById("mrpTables").innerHTML = html;
    
    window.lastCalculatedData = data;
}

async function exportToExcel() {
    if (!window.lastCalculatedData) {
        alert("Brak danych do eksportu");
        return;
    }

    try {
        const res = await fetch('/export', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(window.lastCalculatedData)
        });

        if (!res.ok) throw new Error("Błąd serwera przy eksporcie");

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "wyniki_mrp_eksport.xlsx";
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
    } catch (err) {
        console.error("Eksport nie udał się:", err);
        alert("Nie udało się wyeksportować pliku.");
    }
}

</script>

</body>
</html>
